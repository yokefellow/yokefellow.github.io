name: Deploy GitHub Pages

# 触发条件：在 push 到 gh-pages-source 分支后
on:
  push:
    branches:
      - gh-pages-source

# 任务
jobs:
  build-and-deploy:
    # 服务器环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v2
        with:
          persist-credentials: false

      # 生成静态文件
      - name: Build
        # 获取Vssue在Repo设置的Secret（Client ID、Client Secret）
        env: 
          ClientID: ${{ secrets.VSSUE_CLIENT_ID }}
          ClientSecret: ${{ secrets.VSSUE_CLIENT_SECRET }}
        run: npm install && npm run build
      
      # 如果是发布到自定义域名
      # - name: AddDomain 
      #   run: cd dist && echo 'blog.yokefellow.com.cn' > CNAME

      # 部署到 GitHub Pages
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          BRANCH: master
          FOLDER: dist
          CLEAN: true